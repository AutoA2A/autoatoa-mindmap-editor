<body>
<div class="container">
    <div class="card">
        <h2>分享链接</h2>
        <div id="linkArea" class="hint">正在获取当前思维导图数据……</div>
        <textarea id="linkOutput" readonly></textarea>
        <button id="copyLinkBtn">复制链接</button>
    </div>

    <div class="card">
        <h2>嵌入码（iframe）</h2>
        <textarea id="embedOutput" readonly></textarea>
        <button id="copyEmbedBtn">复制嵌入码</button>
    </div>

    <div class="card">
        <h2>权限设置</h2>
        <label>
            <input type="checkbox" id="viewOnlyChk">
            仅查看（禁止编辑）
        </label>
        <div class="hint">勾选后生成的链接将只允许查看，未勾选则可编辑。</div>
        <button id="refreshBtn">重新生成链接</button>
    </div>
</div>

<script>
// ---------- IndexedDB 读取 ----------
function openDB(){
    return new Promise((resolve,reject)=>{
        const request = indexedDB.open('mindmapDB',1);
        request.onupgradeneeded = e=>{
            const db = e.target.result;
            if(!db.objectStoreNames.contains('state')){
                db.createObjectStore('state');
            }
        };
        request.onsuccess = e=>resolve(e.target.result);
        request.onerror = e=>reject(e.target.error);
    });
}

async function getStateFromIDB(){
    try{
        const db = await openDB();
        return new Promise((resolve,reject)=>{
            const tx = db.transaction('state','readonly');
            const store = tx.objectStore('state');
            const getReq = store.get('mindmapState');
            getReq.onsuccess = ()=>resolve(getReq.result||null);
            getReq.onerror = ()=>resolve(null);
        });
    }catch{
        return null;
    }
}

// ---------- 兼容读取 ----------
async function getState(){
    // 先尝试 IndexedDB
    const idbData = await getStateFromIDB();
    if(idbData){
        try{
            return JSON.parse(idbData);
        }catch{
            // 如果存的是对象直接返回
            return idbData;
        }
    }
    // 再回退到 localStorage（防止旧版仍使用）
    try{
        const ls = localStorage.getItem('mindmapState');
        return ls ? JSON.parse(ls) : null;
    }catch{
        return null;
    }
}

// ---------- 编码 ----------
function base64Encode(str){
    return btoa(unescape(encodeURIComponent(str)));
}

// ---------- 生成链接 ----------
async function generateLink(){
    const state = await getState();
    if(!state){
        document.getElementById('linkArea').textContent = '未检测到思维导图数据，请在编辑器中创建或打开一个导图后再来此页。';
        document.getElementById('linkOutput').value = '';
        document.getElementById('embedOutput').value = '';
        return;
    }
    document.getElementById('linkArea').textContent = '以下链接包含当前导图的完整状态，可直接分享给他人。';
    const base = location.origin + location.pathname.replace(/share\.html$/,'index.html');
    const params = new URLSearchParams();
    const jsonStr = JSON.stringify(state);
    const encoded = base64Encode(jsonStr);
    params.set('data', encoded);
    if(document.getElementById('viewOnlyChk').checked){
        params.set('mode','view');
    }
    const shareUrl = `${base}?${params.toString()}`;
    document.getElementById('linkOutput').value = shareUrl;
    document.getElementById('embedOutput').value = `<iframe src="${shareUrl}" width="800" height="600" style="border:none;"></iframe>`;
}

// ---------- 复制 ----------
async function copyText(text){
    try{
        await navigator.clipboard.writeText(text);
        alert('已复制到剪贴板');
    }catch{
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('已复制到剪贴板');
    }
}

// ---------- 事件 ----------
document.getElementById('copyLinkBtn').addEventListener('click',()=>{
    const txt = document.getElementById('linkOutput').value;
    if(txt) copyText(txt);
});
document.getElementById('copyEmbedBtn').addEventListener('click',()=>{
    const txt = document.getElementById('embedOutput').value;
    if(txt) copyText(txt);
});
document.getElementById('refreshBtn').addEventListener('click',generateLink);
window.addEventListener('load',generateLink);
</script>
