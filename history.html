<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史记录</title>
<style>
:root{
    --primary:#2563eb;
    --primary-hover:#1d4ed8;
    --secondary:#10b983;
    --bg:#f9fafb;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
    --radius:8px;
    --shadow:0 2px 8px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:Helvetica Neue,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    margin-top:60px;
    line-height:1.6;
}
.container{
    max-width:960px;
    margin:0 auto;
    padding:16px;
}
h1{
    font-size:1.6rem;
    color:var(--primary);
    margin-bottom:4px;
}
.subtitle{
    color:var(--muted);
    font-size:0.95rem;
    margin-bottom:24px;
}
.toolbar-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:8px;
}
.search-box{
    flex:1;
    min-width:200px;
    max-width:360px;
    padding:10px 14px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-size:0.95rem;
    outline:none;
    transition:border-color .2s;
}
.search-box:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,0.1);
}
.btn{
    padding:10px 18px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    font-size:0.9rem;
    cursor:pointer;
    transition:background .2s;
    white-space:nowrap;
}
.btn:hover{background:var(--primary-hover)}
.btn-outline{
    background:transparent;
    color:var(--primary);
    border:1px solid var(--primary);
}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-danger{
    background:#ef4444;
    color:#fff;
}
.btn-danger:hover{background:#dc2626}
.btn-success{
    background:var(--secondary);
    color:#fff}
.btn-success:hover{background:#059669}
.btn-sm{
    padding:6px 12px;
    font-size:0.8rem;
    border-radius:4px;
}
.history-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}
.history-card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:16px;
    transition:transform .15s,box-shadow .15s;
    cursor:pointer;
}
.history-card:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 16px rgba(0,0,0,0.12);
}
.card-icon{
    width:48px;
    height:48px;
    border-radius:var(--radius);
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:1.4rem;
    flex-shrink:0;
}
.card-info{
    flex:1;
    min-width:0;
}
.card-name{
    font-weight:600;
    font-size:1rem;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.card-meta{
    font-size:0.8rem;
    color:var(--muted);
    margin-top:2px;
}
.card-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
    flex-wrap:wrap;
}
.empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
}
.empty-state svg{
    width:80px;
    height:80px;
    margin-bottom:16px;
    opacity:0.4;
}
.empty-state p{
    font-size:1rem;
}
/* Modal */
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:1000;
    align-items:center;
    justify-content:center;
}
.modal-overlay.active{display:flex}
.modal{
    background:var(--card);
    border-radius:var(--radius);
    padding:24px;
    width:90%;
    max-width:400px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}
.modal h3{
    margin-bottom:16px;
    color:var(--primary);
}
.modal input[type="text"]{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:4px;
    font-size:0.95rem;
    margin-bottom:16px;
    outline:none;
}
.modal input[type="text"]:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,0.1);
}
.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}
/* Confirm */
.confirm-text{
    margin-bottom:20px;
    font-size:0.95rem;
    color:var(--text);
}
@media(max-width:640px){
    .history-card{
        flex-wrap:wrap;
    }
    .card-actions{
        width:100%;
        justify-content:flex-end;
    }
    .toolbar-bar{
        flex-direction:column;
        align-items:stretch;
    }
    .search-box{max-width:100%}
}

<body>
<div class="container">
    <h1>历史记录</h1>
    <p class="subtitle">管理本地保存的思维导图，支持重命名、删除和打开</p>

    <div class="toolbar-bar">
        <input type="text" class="search-box" id="searchInput" placeholder="搜索思维导图...">
        <button class="btn btn-outline" id="refreshBtn">刷新</button>
        <button class="btn btn-danger" id="clearAllBtn">清空全部</button>
        <!-- 导航链接 -->
        <a href="index.html" class="btn btn-outline">返回编辑器</a>
        <a href="settings.html" class="btn btn-outline">设置</a>
    </div>

    <div class="history-list" id="historyList"></div>
</div>

<!-- Rename Modal -->
<div class="modal-overlay" id="renameModal">
    <div class="modal">
        <h3>重命名</h3>
        <input type="text" id="renameInput" placeholder="输入新名称">
        <div class="modal-actions">
            <button class="btn btn-outline" id="renameCancel">取消</button>
            <button class="btn" id="renameConfirm">确认</button>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <h3>确认操作</h3>
        <p class="confirm-text" id="confirmText"></p>
        <div class="modal-actions">
            <button class="btn btn-outline" id="confirmCancel">取消</button>
            <button class="btn btn-danger" id="confirmOk">确认</button>
        </div>
    </div>
</div>

<script>
(function(){
    'use strict';

    // ==================== IndexedDB 封装 ====================
    const DB_NAME = 'MindMapEditorDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'mindmaps';

    function openDB(){
        return new Promise(function(resolve, reject){
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = function(e){
                const db = e.target.result;
                if(!db.objectStoreNames.contains(STORE_NAME)){
                    const store = db.createObjectStore(STORE_NAME, {keyPath:'id', autoIncrement:true});
                    store.createIndex('updatedAt', 'updatedAt', {unique:false});
                    store.createIndex('name', 'name', {unique:false});
                }
            };
            req.onsuccess = function(){ resolve(e.target.result); };
            req.onerror = function(){ reject(e.target.error); };
        });
    }

    function getAllRecords(){
        return openDB().then(db => {
            return new Promise((resolve, reject)=>{
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = ()=> resolve(req.result || []);
                req.onerror = ()=> reject(req.error);
            });
        });
    }

    function addRecord(record){
        return openDB().then(db => {
            return new Promise((resolve, reject)=>{
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.add(record);
                req.onsuccess = ()=> resolve(req.result);
                req.onerror = ()=> reject(req.error);
            });
        });
    }

    function updateRecord(id, data){
        return openDB().then(db => {
            return new Promise((resolve, reject)=>{
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const getReq = store.get(id);
                getReq.onsuccess = ()=>{
                    const record = getReq.result;
                    if(record){
                        Object.assign(record, data);
                        store.put(record);
                        tx.oncomplete = ()=> resolve(record);
                    } else {
                        reject(new Error('Record not found'));
                    }
                };
                getReq.onerror = ()=> reject(getReq.error);
            });
        });
    }

    function deleteRecord(id){
        return openDB().then(db => {
            return new Promise((resolve, reject)=>{
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = ()=> resolve();
                req.onerror = ()=> reject(req.error);
            });
        });
    }

    function clearAll(){
        return openDB().then(db => {
            return new Promise((resolve, reject)=>{
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.clear();
                req.onsuccess = ()=> resolve();
                req.onerror = ()=> reject(req.error);
            });
        });
    }

    // ==================== UI 渲染 ====================
    const historyListEl = document.getElementById('historyList');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // 重命名 modal
    const renameModal = document.getElementById('renameModal');
    const renameInput = document.getElementById('renameInput');
    const renameCancel = document.getElementById('renameCancel');
    const renameConfirm = document.getElementById('renameConfirm');
    let renameId = null;

    // 确认 modal
    const confirmModal = document.getElementById('confirmModal');
    const confirmText = document.getElementById('confirmText');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmOk = document.getElementById('confirmOk');
    let confirmId = null;
    let confirmAction = null; // 'delete' or 'clearAll'

    function renderHistory(records){
        historyListEl.innerHTML = '';
        if(records.length===0){
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.innerHTML = `
                <svg aria-hidden="true" focusable="false"><path d="M464 64H176c-13.3 0-24 10.7-24 24v352c0 13.3 10.7 24 24 24h288c13.3 0 24-10.7 24-24V88c0-13.3-10.7-24-24-24zm0 400H176V88h288v376zM272 152c-13.3 0-24 10.7-24 24s10.7 24 24 24 24-10.7 24-24-10.7-24-24-24zm96 176c-13.3 0-24 10.7-24 24v56c0 13.3 10.7 24 24 24s24-10.7 24-24v-56c0-13.3-10.7-24-24-24zm-96 64c-13.3 0-24 10.7-24 24v56c0 13.3 10.7 24 24 24s24-10.7 24-24v-56c0-13.3-10.7-24-24-24z"/></svg>
                <p>暂无历史记录</p>
            `;
            historyListEl.appendChild(empty);
            return;
        }
        records.forEach(record=>{
            const card = document.createElement('div');
            card.className = 'history-card';
            card.dataset.id = record.id;
            // 点击卡片打开对应编辑器，携带 id 参数
            card.onclick = () => {
                location.href = `index.html?id=${record.id}`;
            };
            const icon = document.createElement('div');
            icon.className = 'card-icon';
            icon.textContent = '🗺️';
            const info = document.createElement('div');
            info.className = 'card-info';
            const name = document.createElement('div');
            name.className = 'card-name';
            name.textContent = record.name || '未命名';
            const meta = document.createElement('div');
            meta.className = 'card-meta';
            const updated = record.updatedAt ? new Date(record.updatedAt).toLocaleString() : '';
            meta.textContent = updated ? `最后更新：${updated}` : '';
            info.append(name, meta);
            const actions = document.createElement('div');
            actions.className = 'card-actions';
            const renameBtn = document.createElement('button');
            renameBtn.className = 'btn btn-outline btn-sm';
            renameBtn.textContent = '重命名';
            renameBtn.onclick = e=>{
                e.stopPropagation();
                renameId = record.id;
                renameInput.value = record.name || '';
                renameModal.classList.add('active');
                renameInput.focus();
            };
            const delBtn = document.createElement('button');
            delBtn.className = 'btn btn-outline btn-sm';
            delBtn.textContent = '删除';
            delBtn.onclick = e=>{
                e.stopPropagation();
                confirmId = record.id;
                confirmAction = 'delete';
                confirmText.textContent = `确定要删除 “${record.name || '未命名'}” 吗？此操作不可恢复。`;
                confirmModal.classList.add('active');
            };
            actions.append(renameBtn, delBtn);
            card.append(icon, info, actions);
            historyListEl.appendChild(card);
        });
    }

    // ==================== 事件绑定 ====================
    refreshBtn.addEventListener('click', loadHistory);
    searchInput.addEventListener('input', debounce(filterHistory, 300));
    clearAllBtn.addEventListener('click',()=>{
        confirmAction = 'clearAll';
        confirmText.textContent = '确定要清空所有历史记录吗？此操作不可恢复。';
        confirmModal.classList.add('active');
    });

    renameCancel.addEventListener('click',()=> renameModal.classList.remove('active'));
    renameConfirm.addEventListener('click', async()=>{
        const newName = renameInput.value.trim();
        if(!newName){
            alert('名称不能为空');
            return;
        }
        try{
            await updateDB(renameId, {name: newName, updatedAt: Date.now()});
            renameModal.classList.remove('active');
            await loadHistory();
        }catch(err){
            console.error(err);
            alert('重命名失败');
        }
    });

    confirmCancel.addEventListener('click',()=> confirmModal.classList.remove('active'));
    confirmOk.addEventListener('click', async()=>{
        try{
            if(confirmAction === 'delete'){
                await deleteRecord(confirmId);
            }else if(confirmAction === 'clearAll'){
                await clearAll();
            }
            confirmModal.classList.remove('active');
            await loadHistory();
        }catch(err){
            console.error(err);
            alert('操作失败');
        }
    });

    // ==================== 辅助函数 ====================
    async function loadHistory(){
        const records = await getAllRecords();
        // 按更新时间倒序
        records.sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));
        renderHistory(records);
    }

    function filterHistory(){
        const keyword = searchInput.value.trim().toLowerCase();
        getAllRecords().then(records=>{
            const filtered = records.filter(r=>{
                const name = (r.name||'').toLowerCase();
                return name.includes(keyword);
            });
            filtered.sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));
            renderHistory(filtered);
        });
    }

    function debounce(fn, delay){
        let timer;
        return function(...args){
            clearTimeout(timer);
            timer = setTimeout(()=> fn.apply(this, args), delay);
        };
    }

    // 初始化
    loadHistory();
})();
</script>
